<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Usuario - SimaGrow</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background-color: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 450px;
        }

        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #666;
            font-weight: bold;
        }

        input:not([type="checkbox"]) {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            /* Ensures padding doesn't affect overall width */
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
            margin-bottom: 15px;
        }

        .checkbox-group input {
            width: auto;
            margin: 0;
        }

        .checkbox-group label {
            margin: 0;
            cursor: pointer;
        }

        input:focus {
            border-color: #4CAF50;
            outline: none;
            box-shadow: 0 0 5px rgba(76, 175, 80, 0.3);
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            margin-top: 10px;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #45a049;
        }

        .message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 4px;
            text-align: center;
            display: none;
        }

        .success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Crear Usuario SimaGrow</h2>
        <form id="crearUsuarioForm">
            <div class="form-group">
                <label for="nif">NIF</label>
                <input type="text" id="nif" name="nif" required>
            </div>

            <div class="form-group">
                <label for="nombre">Nombre</label>
                <input type="text" id="nombre" name="nombre" required>
            </div>

            <div class="form-group">
                <label for="apellidos">Apellidos</label>
                <input type="text" id="apellidos" name="apellidos" required>
            </div>

            <div class="form-group">
                <label for="fecha_nacimiento">Fecha de Nacimiento</label>
                <input type="date" id="fecha_nacimiento" name="fecha_nacimiento" required>
            </div>


            <div class="checkbox-group">
                <input type="checkbox" id="admin" name="admin">
                <label for="admin">Es Administrador</label>
            </div>


            <button type="submit">Crear Usuario</button>
        </form>

        <div id="resultado" class="message"></div>
    </div>

    <script>
        document.getElementById('crearUsuarioForm').addEventListener('submit', function (event) {
            event.preventDefault(); // Evitar recarga de la página

            const btnSubmit = event.target.querySelector('button');
            btnSubmit.disabled = true;
            btnSubmit.innerText = 'Creando...';

            // Recoger datos del formulario
            const data = {
                nif: document.getElementById('nif').value,
                nombre: document.getElementById('nombre').value,
                apellidos: document.getElementById('apellidos').value,
                fecha_nacimiento: document.getElementById('fecha_nacimiento').value,
                admin: document.getElementById('admin').checked,
                creditos: 0
            };

            const resultadoDiv = document.getElementById('resultado');

            //cambiar por IP
            fetch('http://localhost:8069/simagrow/usuario/create', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(data)
            })
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Error en la respuesta del servidor');
                    }
                    return response.json();
                })
                .then(data => {
                    resultadoDiv.style.display = 'block';
                    if (data.status === 'success') {
                        resultadoDiv.className = 'message success';
                        resultadoDiv.innerText = '¡Usuario creado correctamente! (ID: ' + data.id + ')';
                        document.getElementById('crearUsuarioForm').reset();
                    } else {
                        resultadoDiv.className = 'message error';
                        resultadoDiv.innerText = 'Error al crear el usuario: ' + (data.error || 'Desconocido');
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    resultadoDiv.style.display = 'block';
                    resultadoDiv.className = 'message error';
                    resultadoDiv.innerText = 'Error de conexión. ¿Está Odoo corriendo?';
                })
                .finally(() => {
                    btnSubmit.disabled = false;
                    btnSubmit.innerText = 'Crear Usuario';
                });
        });
    </script>

</body>

</html>
